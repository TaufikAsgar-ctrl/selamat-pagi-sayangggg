<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buat QR Love ♥</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(160deg,#6b7bb8 0%,#ff8b9e 35%,#ffb199 65%,#ffd9a0 100%);
    display:flex;align-items:center;justify-content:center;
    padding:20px;
  }
  .card{
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(14px);
    border-radius:26px;
    padding:36px 32px;
    max-width:440px;
    width:100%;
    text-align:center;
    box-shadow:0 8px 32px rgba(190,120,140,0.35);
  }
  h1{color:#ff5c8a;font-size:24px;margin-bottom:6px;}
  p{color:#7a6367;font-size:13px;margin-bottom:18px;}
  label{
    display:block;text-align:left;font-size:12px;color:#7a6367;
    margin-bottom:5px;margin-top:12px;font-weight:600;
  }
  input[type=text]{
    width:100%;padding:12px 16px;border-radius:14px;
    border:1px solid #ffd0dd;font-size:14px;outline:none;
  }
  input[type=text]:focus{border-color:#ff8fab;}
  .row{display:flex;gap:12px;}
  .row > div{flex:1;text-align:left;}
  input[type=color]{
    width:100%;height:40px;border:none;border-radius:10px;cursor:pointer;
    background:none;
  }
  input[type=file]{
    width:100%;font-size:12px;
    padding:8px;border:1px dashed #ffd0dd;border-radius:10px;
  }
  #generateBtn{
    width:100%;margin-top:20px;padding:13px;border:none;border-radius:14px;
    background:linear-gradient(135deg,#ff8fab,#ff5c8a);color:#fff;
    font-size:15px;font-weight:600;cursor:pointer;
  }
  #generateBtn:hover{opacity:.92;}
  #qrResult{margin-top:22px;display:flex;flex-direction:column;align-items:center;gap:14px;}
  #qrHidden{position:absolute;left:-9999px;top:-9999px;}
  #finalCanvas{
    border-radius:16px;background:#fff;padding:14px;
    box-shadow:0 4px 16px rgba(0,0,0,.1);
  }
  #downloadBtn{
    display:none;background:none;border:2px solid #ff8fab;color:#ff5c8a;
    padding:10px 22px;border-radius:14px;font-weight:600;cursor:pointer;
  }
  .hint{font-size:11px;color:#a58d91;margin-top:6px;}
</style>
</head>
<body>
  <div class="card">
    <h1>Buat QR Love ♥</h1>
    <p>Tempel link website kamu (setelah online), atur tampilannya, lalu unduh QR-nya.</p>

    <label>Link website</label>
    <input type="text" id="linkInput" placeholder="https://nama-website-kamu.netlify.app">

    <div class="row">
      <div>
        <label>Warna QR</label>
        <input type="color" id="colorDark" value="#ff5c8a">
      </div>
      <div>
        <label>Warna latar</label>
        <input type="color" id="colorLight" value="#ffffff">
      </div>
    </div>

    <label>Logo di tengah (opsional, foto/ikon hati/inisial kalian)</label>
    <input type="file" id="logoInput" accept="image/*">

    <button id="generateBtn">Buat QR Code</button>

    <div id="qrResult">
      <div id="qrHidden"></div>
      <canvas id="finalCanvas" width="280" height="280" style="display:none;"></canvas>
      <button id="downloadBtn">⬇ Unduh QR (PNG)</button>
    </div>
    <p class="hint">Semua proses dilakukan di browser kamu sendiri, tidak dikirim ke server manapun.</p>
  </div>

<script>
  const qrHidden = document.getElementById("qrHidden");
  const finalCanvas = document.getElementById("finalCanvas");
  const ctx = finalCanvas.getContext("2d");
  const downloadBtn = document.getElementById("downloadBtn");

  document.getElementById("generateBtn").addEventListener("click", ()=>{
    const link = document.getElementById("linkInput").value.trim();
    if(!link){ alert("Isi dulu link website-nya ya!"); return; }

    const colorDark = document.getElementById("colorDark").value;
    const colorLight = document.getElementById("colorLight").value;
    const logoFile = document.getElementById("logoInput").files[0];

    qrHidden.innerHTML = "";
    new QRCode(qrHidden, {
      text: link,
      width: 280,
      height: 280,
      colorDark: colorDark,
      colorLight: colorLight,
      correctLevel: QRCode.CorrectLevel.H // paling tahan banting, aman walau ada logo di tengah
    });

    // tunggu QR selesai digambar lalu proses ke canvas final
    setTimeout(()=>{
      const qrImg = qrHidden.querySelector("img") || qrHidden.querySelector("canvas");
      const draw = (imgSource)=>{
        ctx.clearRect(0,0,280,280);
        ctx.drawImage(imgSource, 0, 0, 280, 280);

        if(logoFile){
          const reader = new FileReader();
          reader.onload = (e)=>{
            const logo = new Image();
            logo.onload = ()=>{
              const size = 60; // ukuran logo, aman karena correctLevel H (~30% toleransi)
              const x = (280 - size)/2;
              const y = (280 - size)/2;
              // lingkaran putih di belakang logo biar kontras
              ctx.fillStyle = "#ffffff";
              ctx.beginPath();
              ctx.arc(140, 140, size/2 + 6, 0, Math.PI*2);
              ctx.fill();
              ctx.save();
              ctx.beginPath();
              ctx.arc(140, 140, size/2, 0, Math.PI*2);
              ctx.clip();
              ctx.drawImage(logo, x, y, size, size);
              ctx.restore();
              finishRender();
            };
            logo.src = e.target.result;
          };
          reader.readAsDataURL(logoFile);
        } else {
          finishRender();
        }
      };

      if(qrImg.tagName === "IMG"){
        if(qrImg.complete){ draw(qrImg); }
        else { qrImg.onload = ()=> draw(qrImg); }
      } else {
        draw(qrImg);
      }
    }, 200);
  });

  function finishRender(){
    finalCanvas.style.display = "inline-block";
    downloadBtn.style.display = "inline-block";
  }

  downloadBtn.addEventListener("click", ()=>{
    const link = document.createElement("a");
    link.download = "qr-love.png";
    link.href = finalCanvas.toDataURL("image/png");
    link.click();
  });
</script>
</body>
</html>
